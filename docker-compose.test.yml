name: cenote

services:
  postgres:
    # pgvector/pgvector:pg16 as of 2026-05-28; re-pin manually on upgrade
    image: pgvector/pgvector@sha256:00ba258a66dac104fd5171074a0084462a64a1369d8513f3d0a634e2f24d15bc
    environment:
      POSTGRES_USER: cenote
      POSTGRES_PASSWORD: cenote
      POSTGRES_DB: cenote_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cenote -d cenote_test"]
      interval: 2s
      timeout: 5s
      retries: 30
