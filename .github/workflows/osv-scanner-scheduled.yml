name: OSV-Scanner Scheduled

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"  # Mondays 04:17 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan-scheduled:
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8"
