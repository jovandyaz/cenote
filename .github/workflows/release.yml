name: Release
# Manual fallback for re-running publish on an existing tag.
# Normal automatic flow runs inside .github/workflows/release-please.yml.

on:
  workflow_dispatch:

permissions:
  contents: write  # softprops/action-gh-release needs write to attach SBOM asset
  id-token: write  # Trusted Publishing + Sigstore attestations

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cenote-core
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --all-extras
      - name: Build wheel + sdist
        run: uv build
      - name: Verify build in isolated venv
        run: |
          uv venv /tmp/verify
          uv pip install --python /tmp/verify/bin/python dist/cenote_core-*.whl
          /tmp/verify/bin/python -c "import cenote; print(cenote.__version__)"
      - name: Generate CycloneDX SBOM
        run: ./scripts/generate_sbom.sh
      - name: Attach SBOM to GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: sbom.cdx.json
          fail_on_unmatched_files: true
      # Sigstore signing is auto-applied by pypa/gh-action-pypi-publish via PEP 740.
      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
