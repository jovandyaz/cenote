name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cenote-core
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --all-extras
      - name: Build wheel + sdist
        run: uv build
      - name: Verify build in isolated venv
        run: |
          uv venv /tmp/verify
          uv pip install --python /tmp/verify/bin/python dist/cenote_core-*.whl
          /tmp/verify/bin/python -c "import cenote; print(cenote.__version__)"
      - name: Generate CycloneDX SBOM
        run: ./scripts/generate_sbom.sh
      - name: Attach SBOM to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: sbom.cdx.json
          fail_on_unmatched_files: true
      # Sigstore signing is auto-applied by pypa/gh-action-pypi-publish via PEP 740.
      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
