name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      # Use RELEASE_PLEASE_TOKEN (a fine-grained PAT with `contents:write` +
      # `pull-requests:write`) if available; fall back to GITHUB_TOKEN. PRs
      # opened/pushed with GITHUB_TOKEN do NOT trigger downstream workflows
      # (documented GH Actions limitation), so CI checks never start until
      # someone manually close+reopens the PR. A PAT lifts that restriction.
      # See https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication#using-the-github_token-in-a-workflow
      - uses: googleapis/release-please-action@v5.0.0
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

      # release-please bumps pyproject.toml [project].version but does NOT touch
      # uv.lock's self-reference (e.g. cenote-core's own version stays stale).
      # CI's `uv sync --locked` then fails with "lockfile needs to be updated".
      # We push a follow-up commit to the release-please PR branch so the PR
      # already contains a synced lockfile by the time it's reviewed and merged.
      - name: Checkout release-please PR branch (if open)
        if: steps.rp.outputs.prs_created == 'true' || steps.rp.outputs.prs
        uses: actions/checkout@v6
        with:
          ref: release-please--branches--main--components--cenote-core
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Install uv
        if: steps.rp.outputs.prs_created == 'true' || steps.rp.outputs.prs
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync uv.lock to bumped version
        if: steps.rp.outputs.prs_created == 'true' || steps.rp.outputs.prs
        run: |
          uv python install 3.12
          uv lock
          if git diff --quiet uv.lock; then
            echo "uv.lock already in sync — nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git commit -m "chore: sync uv.lock to bumped version"
          git push

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cenote-core
    permissions:
      contents: write  # softprops/action-gh-release attaches SBOM asset
      id-token: write  # Trusted Publishing + PEP 740 Sigstore attestations
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --all-extras
      - name: Build wheel + sdist
        run: uv build
      - name: Verify build in isolated venv
        run: |
          uv venv /tmp/verify
          uv pip install --python /tmp/verify/bin/python dist/cenote_core-*.whl
          /tmp/verify/bin/python -c "import cenote; print(cenote.__version__)"
      - name: Generate CycloneDX SBOM
        run: ./scripts/generate_sbom.sh
      - name: Attach SBOM to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: sbom.cdx.json
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          fail_on_unmatched_files: true
      # Sigstore signing is auto-applied by pypa/gh-action-pypi-publish via PEP 740.
      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
