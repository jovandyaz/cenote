name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      # PAT triggers downstream CI on PR push; GITHUB_TOKEN does not.
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

      # release-please bumps pyproject but not uv.lock self-reference; sync it on the PR branch.
      - name: Checkout release-please PR branch (if open)
        if: steps.rp.outputs.prs_created == 'true' || steps.rp.outputs.prs
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: release-please--branches--main--components--cenote-core
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Install uv
        if: steps.rp.outputs.prs_created == 'true' || steps.rp.outputs.prs
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
      - name: Sync uv.lock to bumped version
        if: steps.rp.outputs.prs_created == 'true' || steps.rp.outputs.prs
        run: |
          uv python install 3.12
          uv lock
          if git diff --quiet uv.lock; then
            echo "uv.lock already in sync — nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git commit -m "chore: sync uv.lock to bumped version"
          git push

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cenote-core
    permissions:
      contents: write  # softprops/action-gh-release attaches SBOM asset
      id-token: write  # Trusted Publishing + PEP 740 Sigstore attestations
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --all-extras
      - name: Build wheel + sdist
        run: uv build
      - name: Verify build in isolated venv
        run: |
          uv venv /tmp/verify
          uv pip install --python /tmp/verify/bin/python dist/cenote_core-*.whl
          /tmp/verify/bin/python -c "import cenote; print(cenote.__version__)"
      - name: Generate CycloneDX SBOM
        run: ./scripts/generate_sbom.sh
      - name: Attach SBOM to GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: sbom.cdx.json
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          fail_on_unmatched_files: true
      # Sigstore signing is auto-applied by pypa/gh-action-pypi-publish via PEP 740.
      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
